name: Deploy Worker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        type: string
      environment:
        description: Target Wrangler environment
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    environment:
      name: ${{ github.event_name == 'pull_request' && 'staging' || github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    timeout-minutes: 20
    concurrency:
      group: deploy-${{ github.workflow }}-${{ github.event_name == 'pull_request' && 'staging' || github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging') }}
    steps:
      - name: Resolve target environment and ref
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            target_env="${{ inputs.environment }}"
            deploy_ref="${{ inputs.ref }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            target_env="staging"
            deploy_ref="${{ github.event.pull_request.head.sha }}"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            target_env="production"
            deploy_ref="${GITHUB_SHA}"
          else
            echo "Unsupported event/ref combination"
            exit 1
          fi

          if [[ "${target_env}" == "staging" ]]; then
            deploy_command="bun run cf:deploy:staging"
          else
            deploy_command="bun run cf:deploy"
          fi

          {
            echo "target_env=${target_env}"
            echo "deploy_ref=${deploy_ref}"
            echo "deploy_command=${deploy_command}"
          } >> "${GITHUB_OUTPUT}"

      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.deploy_ref }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate build environment
        env:
          TARGET_ENV: ${{ steps.resolve.outputs.target_env }}
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${VITE_CONVEX_URL:-}" ]]; then
            echo "::error::Missing required GitHub Environment variable: VITE_CONVEX_URL"
            echo "Expected this secret on the GitHub Environment '${TARGET_ENV}':"
            echo "- VITE_CONVEX_URL"
            exit 1
          fi

          {
            echo "### Build Environment"
            echo ""
            echo "- Target environment: \`${TARGET_ENV}\`"
            echo "- VITE_CONVEX_URL: \`${VITE_CONVEX_URL}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Deploy Worker
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DEPLOY_COMMAND: ${{ steps.resolve.outputs.deploy_command }}
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
        shell: bash
        run: |
          set -euo pipefail

          output_file="$(mktemp)"
          export WRANGLER_OUTPUT_FILE_PATH="${output_file}"

          ${DEPLOY_COMMAND}

          deploy_entry="$(
            jq -sc 'map(select(.type == "deploy")) | last // {}' "${output_file}"
          )"
          deploy_url="$(jq -r '.targets[0] // ""' <<< "${deploy_entry}")"
          version_id="$(jq -r '.version_id // ""' <<< "${deploy_entry}")"

          {
            echo "deploy_url=${deploy_url}"
            echo "version_id=${version_id}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "### Cloudflare Deploy"
            echo ""
            echo "- Environment: \`${{ steps.resolve.outputs.target_env }}\`"
            if [[ -n "${deploy_url}" ]]; then
              echo "- URL: ${deploy_url}"
            fi
            if [[ -n "${version_id}" ]]; then
              echo "- Version: \`${version_id}\`"
            fi
            echo "- Commit: \`${{ steps.resolve.outputs.deploy_ref }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Comment on PR with staging URL
        if: github.event_name == 'pull_request' && steps.deploy.outputs.deploy_url != ''
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TARGET_ENV: ${{ steps.resolve.outputs.target_env }}
          VERSION_ID: ${{ steps.deploy.outputs.version_id }}
          DEPLOY_REF: ${{ steps.resolve.outputs.deploy_ref }}
        shell: bash
        run: |
          set -euo pipefail

          marker='<!-- cf-staging-deploy -->'
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body="$(
            printf '%s\n\n%s\n\n%s\n%s\n%s\n%s\n' \
              "${marker}" \
              "Staging deploy updated for this PR." \
              "URL: ${DEPLOY_URL}" \
              "Environment: ${TARGET_ENV}" \
              "Commit: \`${DEPLOY_REF}\`" \
              "Version: \`${VERSION_ID}\`"
          )"
          body="${body}"$'\n'"Run: ${run_url}"

          comment_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
              | jq -r '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("<!-- cf-staging-deploy -->")) | .id' \
              | head -n1
          )"

          if [[ -n "${comment_id}" ]]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
              --method PATCH \
              --raw-field body="${body}" \
              >/dev/null
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --method POST \
              --raw-field body="${body}" \
              >/dev/null
          fi
